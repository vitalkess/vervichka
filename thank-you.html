<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Дякуємо — Вервичка</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #FAF7F2;
      --warm-white: #FFFFFF;
      --gold: #B8914A;
      --gold-light: #D4AF6E;
      --gold-pale: #F0E6D0;
      --charcoal: #2A2520;
      --text-mid: #5C5248;
      --text-light: #9C8E82;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--charcoal);
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 32px;
      text-align: center;
    }

    .cross {
      font-size: 42px;
      color: var(--gold);
      margin-bottom: 28px;
      animation: fadeIn 0.8s ease both;
    }

    .title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 40px;
      font-weight: 400;
      font-style: italic;
      line-height: 1.15;
      color: var(--charcoal);
      margin-bottom: 16px;
      animation: fadeIn 0.8s ease 0.15s both;
    }

    .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-style: italic;
      font-weight: 300;
      color: var(--text-mid);
      line-height: 1.6;
      margin-bottom: 40px;
      animation: fadeIn 0.8s ease 0.3s both;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      margin-bottom: 40px;
      animation: fadeIn 0.8s ease 0.4s both;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-light));
    }
    .divider::after {
      background: linear-gradient(to left, transparent, var(--gold-light));
    }
    .divider-icon {
      color: var(--gold);
      font-size: 14px;
    }

    .info-block {
      background: var(--warm-white);
      border-radius: 18px;
      padding: 28px 24px;
      width: 100%;
      margin-bottom: 32px;
      animation: fadeIn 0.8s ease 0.5s both;
    }

    .info-block p {
      font-size: 14px;
      color: var(--text-mid);
      line-height: 1.7;
    }

    .info-block strong {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 500;
      color: var(--charcoal);
      margin-bottom: 8px;
    }

    .btn-back {
      display: block;
      width: 100%;
      padding: 17px;
      background: linear-gradient(135deg, #B8914A 0%, #D4AF6E 50%, #B8914A 100%);
      background-size: 200% 100%;
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(184,145,74,0.35);
      transition: transform 0.15s ease;
      animation: fadeIn 0.8s ease 0.6s both;
    }

    .btn-back:active { transform: translateY(-1px); }

    .footer-note {
      margin-top: 32px;
      font-size: 11px;
      color: var(--text-light);
      letter-spacing: 0.05em;
      animation: fadeIn 0.8s ease 0.7s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>

</head>
<body>

  <div class="cross"><svg width="32" height="36" viewBox="0 0 32 36" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="12.5" y="0" width="7" height="36" rx="3.5" fill="#B8914A"/><rect x="0" y="8" width="32" height="7" rx="3.5" fill="#B8914A"/></svg></div>

  <h1 class="title">Дякуємо<br/>за замовлення</h1>

  <p class="subtitle">
    Нехай ця каблучка стане<br/>
    захистом і молитвою<br/>
    у кожен день вашого життя.
  </p>

  <div class="divider"><span class="divider-icon">✦</span></div>

  <div class="info-block">
    <strong>Що далі?</strong>
    <p>Ми зателефонуємо вам найближчим часом, щоб підтвердити замовлення та уточнити деталі доставки.</p>
  </div>

  <a href="index.html" class="btn-back">Повернутись на головну</a>

  <p class="footer-note">Вервичка · Каблучка-оберіг · Срібло &amp; Золото</p>

</body>
</html>
